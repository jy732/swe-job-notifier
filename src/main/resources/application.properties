spring.config.import=optional:file:.env[.properties]
spring.application.name=swe-job-notifier

# Scheduler thread pool (default is 1 — poll hangs block daily summary)
spring.task.scheduling.pool.size=4

# H2 file-based database
spring.datasource.url=jdbc:h2:file:./data/jobs;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Temporary: DEBUG for signal extraction
logging.level.com.github.jingyangyu.swejobnotifier.service.classification.GeminiClient=DEBUG

# Actuator: health + metrics + custom job metrics
management.endpoints.web.exposure.include=health,metrics,info,loggers
management.endpoint.health.show-details=always

# Polling: every 15 minutes
job.poll.cron=0 */15 * * * *

# Daily summary: 8:00 AM every day
job.summary.cron=0 0 8 * * *

# Data retention: delete jobs posted more than N days ago (cleanup at 3 AM daily)
job.retention.days=90
job.cleanup.cron=0 0 3 * * *

# Gemini API for job classification
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# Companies - Greenhouse (comma-separated slugs)
job.companies.greenhouse=stripe,airbnb,cloudflare,datadog,twilio,figma,discord,coinbase,robinhood,pinterest,dropbox,doordashusa,instacart,databricks,mongodb,elastic,gitlab,roblox,unity3d,lyft,block,anthropic,twitch,okta,duolingo,linkedin,godaddy,epicgames,roku,reddit,squarespace,groupon,yext,thumbtack,purestorage,lucidmotors,janestreet,nextdoor,sofi,coursera,samsara,verkada,waymo,scaleai,brex,rubrik,appliedintuition,thetradedesk,lucidsoftware,towerresearchcapital,genevatrading,billcom,qualtrics,ziprecruiter,ixllearning,akunacapital,point72,instabase,chime,otterai,flexport,affirm,coupang,ripple,oscar,aquaticcapitalmanagement,gleanwork,smartsheet,stubhubinc

# Companies - Lever (comma-separated slugs)
job.companies.lever=netflix,spotify,palantir,plaid,veeva,zoox,quantcast,belvederetrading,weride

# Email (all from env vars)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
job.notification.to=${NOTIFICATION_EMAIL:}
job.notification.to.l3=${NOTIFICATION_EMAIL_L3:}

# Notification scan: every 5 minutes
job.notification.scan.cron=0 */5 * * * *

