spring.application.name=swe-job-notifier

# H2 file-based database
spring.datasource.url=jdbc:h2:file:./data/jobs;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Polling: every 15 minutes
job.poll.cron=0 */15 * * * *

# Daily summary: 8:00 AM every day
job.summary.cron=0 0 8 * * *

# Gemini API for job classification
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-flash-latest

# Companies - Greenhouse (comma-separated slugs)
job.companies.greenhouse=stripe,airbnb,cloudflare,datadog,twilio,figma,discord,coinbase,robinhood,pinterest,dropbox,doordashusa,instacart,databricks,mongodb,elastic,gitlab,roblox,unity3d,lyft,block,anthropic,twitch,okta,duolingo

# Companies - Lever (comma-separated slugs)
job.companies.lever=netflix,spotify,palantir,plaid

# Email (all from env vars)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
job.notification.to=${NOTIFICATION_EMAIL:}

# Workday companies (indexed list with subdomain, instance, site)
